<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Digital Library</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p>Join us today to explore AI-driven reading features.</p>
        <form id="registerForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" required placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" required placeholder="john@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPassword" required placeholder="••••••••">
            </div>
            <div class="input-group">
                <label>Role</label>
                <select id="regRole">
                    <option value="USER">User</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn-auth">Register</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="login.html">Login here</a></p>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
