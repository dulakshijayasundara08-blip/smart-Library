<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Digital Library</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Login to access your personalized library dashboard.</p>
        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" required placeholder="name@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-auth">Sign In</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
